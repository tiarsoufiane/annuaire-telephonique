<div style="text-align:center; padding: 20px; background-color: #f4f4f4; border-bottom: 2px solid #ddd; margin-bottom: 20px;">
  <h3>Ajouter un nouveau contact</h3>
  
  <div style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;">
    <input [(ngModel)]="newContact.prenom" placeholder="Prénom">
    <input [(ngModel)]="newContact.nom" placeholder="Nom">
    <input [(ngModel)]="newContact.telephone" placeholder="Téléphone">
    <input [(ngModel)]="newContact.email" placeholder="Email">
    
    <button (click)="addContact()" style="background-color: #28a745; color: white; border: none; padding: 5px 15px; cursor: pointer; border-radius: 4px;">
      Enregistrer
    </button>
  </div>
</div>

<div style="text-align:center">
  <h1>Mon Annuaire</h1>

  <table border="1" style="margin: auto; width: 80%; border-collapse: collapse;">
    <thead>
      <tr style="background-color: #eee;">
        <th>Prénom</th>
        <th>Nom</th>
        <th>Téléphone</th>
        <th>Email</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let c of contacts">
        <ng-container *ngIf="editingContact && editingContact.id === c.id; else readMode">
          <td><input [(ngModel)]="editingContact.prenom"></td>
          <td><input [(ngModel)]="editingContact.nom"></td>
          <td><input [(ngModel)]="editingContact.telephone"></td>
          <td><input [(ngModel)]="editingContact.email"></td>
          <td>
            <button (click)="updateContact()" style="background-color: #007bff; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; margin-right: 5px;">Valider</button>
            <button (click)="cancelEdit()" style="background-color: #6c757d; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px;">Annuler</button>
          </td>
        </ng-container>

        <ng-template #readMode>
          <td>{{ c.prenom }}</td>
          <td>{{ c.nom }}</td>
          <td>{{ c.telephone }}</td>
          <td>{{ c.email }}</td>
          <td>
            <button (click)="startEdit(c)" style="background-color: #ffc107; color: black; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; margin-right: 5px;">Modifier</button>
            <button (click)="deleteContact(c.id)" style="background-color: #dc3545; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px;">Supprimer</button>
          </td>
        </ng-template>
      </tr>
    </tbody>
  </table>

  <p *ngIf="contacts.length === 0" style="margin-top: 20px;">Aucun contact trouvé.</p>
</div>
